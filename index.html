<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Security Alert</title>
<style>
body {
    margin: 0;
    background: black;
    color: red;
    font-family: monospace;
    text-align: center;
}
#screen {
    position: fixed;
    width: 100%;
    height: 100%;
    padding-top: 100px;
}
h1 {
    font-size: 40px;
}
#progress {
    width: 80%;
    margin: 20px auto;
    border: 1px solid red;
}
#bar {
    width: 0%;
    height: 20px;
    background: red;
}
</style>
</head>

<body onclick="goFullScreen()">

<div id="screen">
    <h1>⚠️ SYSTEM COMPROMISED ⚠️</h1>
    <p id="msg">Initialisation...</p>

    <div id="progress">
        <div id="bar"></div>
    </div>

    <p>Ne fermez pas votre ordinateur...</p>
</div>

<script>
let messages = [
    "Connexion au serveur...",
    "Accès root obtenu...",
    "Extraction des fichiers...",
    "Envoi des données...",
    "Installation du ransomware..."
];

let i = 0;
let progress = 0;

function update() {
    if (progress < 100) {
        progress++;
        document.getElementById("bar").style.width = progress + "%";

        if (progress % 20 === 0 && i < messages.length) {
            document.getElementById("msg").innerText = messages[i];
            i++;
        }

        setTimeout(update, 80);
    } else {
        hackedMessage();
    }
}

function hackedMessage() {
    document.getElementById("msg").innerText = "💀 VOTRE SYSTÈME A ÉTÉ PIRATÉ 💀";

    setTimeout(() => {
        document.body.innerHTML = "<h1 style='color:white; margin-top:20%;'>😄 C'ÉTAIT UNE BLAGUE !</h1>";
    }, 5000);
}

function goFullScreen() {
    document.documentElement.requestFullscreen();
}

setTimeout(() => {
    alert("⚠️ Virus détecté !");
}, 2000);

update();
</script>

</body>
</html>
